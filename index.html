<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <title>Regina's 26th Birthday</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/assets/Flor.png">
</head>
<body>

    <!-- DECORACIONES -->
     <img class="deco deco-orchidsota-main"  src="assets/Floresota.png"       alt="">
    <img class="deco deco-orchid-main"  src="assets/Florplantita.png"       alt="">
    <img class="deco deco-orchid-solo"  src="assets/Flor.png"               alt="">
    <img class="deco deco-ramita"       src="assets/ramitafloresita.png"    alt="">
    <img class="deco deco-plantita"     src="assets/ramita.png"             alt="">
    <img class="deco deco-bolitas"      src="assets/Plantita_bolitas.png"   alt="">
    <img class="deco deco-star"         src="assets/Estrellita.png" alt="">

    <main class="container fade-in">

        <!-- HERO — cada línea controlada, sin saltos inesperados -->
        <header class="hero">
            <h1 class="main-title">Regina's</h1>
            <h2 class="sub-title">26th birthday</h2>
        </header>

        <!-- COUNTDOWN -->
        <section class="countdown-section">
            <p class="countdown-label">FALTAN</p>
            <div id="countdown" class="countdown-container">
                <div class="countdown-item"><span id="days">00</span><small>Días</small></div>
                <div class="countdown-item"><span id="hours">00</span><small>Hrs</small></div>
                <div class="countdown-item"><span id="minutes">00</span><small>Min</small></div>
                <div class="countdown-item"><span id="seconds">00</span><small>Seg</small></div>
            </div>
        </section>

        <!-- INFO — fecha en una sola línea, bloque separado para hora y lugar -->
        <section class="event-info">
            <p class="info-line info-date">Domingo · 17 de mayo</p>
            <p class="info-line info-time">2:30 pm</p>
            <p class="info-line info-place">San Juan Capistrano · M89</p>
            <a href="https://maps.app.goo.gl/FNmNWKwW6Pfu64Eh7" class="btn-ghost" target="_blank">Ver en Google Maps</a>
        </section>


        <!-- RSVP -->
        <section class="rsvp-simple">
            <h2 class="script-heading">Rsvp</h2>
            <p class="instruction-text">Confirma antes del 10 de mayo</p>
            <a href="https://wa.me/526634021233?text=¡Hola%20Regina!%20Confirmo%20mi%20asistencia%20a%20tu%20cumple%2026." class="btn-rsvp" target="_blank">
                Confirmar asistencia
            </a>
        </section>

        <footer>
            <a href="https://www.instagram.com/madebysliver/" target="_blank">made by sliver</a>
        </footer>

    </main>

    <script src="script.js"></script>
</body>
</html>
